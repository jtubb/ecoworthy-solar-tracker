# Copy to secrets.yaml and fill in real values.
# secrets.yaml is gitignored and never committed.

# Home Assistant API encryption key (base64, 32 bytes).  Generate with:
#   python3 -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
ha_api_key: "your-ha-api-key-base64"

# OTA update password for esphome OTA.  Any non-empty string; used by `esphome upload`.
ota_password: "your-ota-password"

# WiFi network the ESP nodes join.
wifi_ssid: "your-wifi-ssid"
wifi_password: "your-wifi-password"

# Fallback hotspot password when the node cannot reach the configured WiFi.
fallback_password: "fallback-ap-password"

# Phase 4 mesh pre-shared key.  Any string >= 16 chars; SHA-256 is taken and
# truncated to 16 bytes for the AES-128-GCM key.  Must be IDENTICAL on every
# tracker node in the array.  Changing this key requires reflashing all nodes.
tracker_mesh_psk: "change-me-to-a-long-random-string"

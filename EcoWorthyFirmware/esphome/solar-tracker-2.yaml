# Solar tracker 2 -- ESP-01S half-duplex bridge to the STC15 board.
#
# Secondary node in the Phase 4 mesh.  Identical to solar-tracker-1
# except for device name, static IP, and tracker_id.  The mesh channel
# and PSK must match tracker-1's values exactly.
#
# P6-1: no_wind_sensor role -- tracker-2 has no physical wind sensor.
# It does NOT set has_wind_sensor: true, so it is never elected wind
# primary.  Wind readings arrive via WIND mesh frames from tracker-1.
#
# BENCH NOTE: the wind_override slider below can still inject synthetic
# wind values into this node's local STC (if one is connected), but its
# WIND broadcast path is now gated by the auto-election: since
# has_wind_sensor is false here, mesh_tx_wind_() is never called and the
# slider's value does NOT propagate to other nodes.  If you need to test
# the full WIND broadcast path on the bench without a real sensor,
# temporarily set has_wind_sensor: true on this node to force election.
#
# To validate ESP-NOW: flash this to a spare ESP-01S, power both nodes,
# and watch the ESPHome logs.  With test_broadcast: true you should see:
#   tracker-1 log: "test broadcast sent"
#   tracker-2 log: "mesh rx type=99 from XX:XX:XX:XX:XX:XX plen=2"
# and vice-versa.  If you see "AES auth fail", the PSKs differ.

substitutions:
  device_name: solar-tracker-2
  friendly_name: "Solar Tracker 2"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m

logger:
  # HW UART is dedicated to the STC bridge -- disable serial logging.
  baud_rate: 0

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  # OTA-from-dashboard relies on this hostname resolving to the device's
  # DHCP-assigned IP.  Mikrotik DNS reservations register `${device_name}.home.local`
  # for each tracker, so the dashboard does not need a hardcoded IP.
  use_address: ${device_name}.home.local
  ap:
    ssid: "${device_name} Fallback"
    password: !secret fallback_password

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

web_server:
  port: 80
  include_internal: true

external_components:
  # Phase 3/4 bridge component, fetched from the project repo on each
  # build.  Lives at <repo-root>/esphome/components/tracker_bridge/
  - source: github://jtubb/ecoworthy-solar-tracker
    components: [tracker_bridge]
    refresh: 0s

uart:
  id: uart_bus
  rx_buffer_size: 512
  baud_rate: 9600
  tx_pin: GPIO1
  rx_pin: GPIO3
  # NOTE: do not add a `uart: debug:` block here.  It registers as a second
  # consumer of the UART RX buffer and steals bytes from tracker_bridge --
  # diagnosed 2026-05-22.  If you need to sniff the wire, use a logic analyser
  # on GPIO1/3 instead.

# --- Phase 3 bridge + Phase 4 mesh ------------------------------------
tracker_bridge:
  id: bridge
  uart_id: uart_bus
  mesh:
    channel: 6        # must match wifi: channel: above
    psk: !secret tracker_mesh_psk
    has_wind_sensor: false  # P6-1: no sensor here; never elected wind primary
    # Fleet-wide peer list lives in secrets.yaml.  The codegen auto-filters this
    # node's own esphome.name from the list, so the same secret can be shared
    # across every tracker in the array -- adding a new tracker means editing
    # one place (secrets.yaml) + creating its device YAML.
    peers: !secret tracker_peers

# NOTE: do not add a `stream_server:` block here.  It registers as a second
# consumer of the UART and competes with tracker_bridge for RX bytes
# (diagnosed 2026-05-22).  If you need a raw TCP<->UART debug shell, do it
# on a spare ESP wired to the STC instead of multiplexing on this one.

# --- Sensors / status -------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "$friendly_name WiFi Signal"
    update_interval: 60s
  # Local STC status sensors.  P5-12: peer_id: solar-tracker-1 mirror block
  # dropped (T1 publishes these on its own device now that both nodes have
  # their own STC).
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    az:
      name: "$friendly_name Azimuth %"
    el:
      name: "$friendly_name Elevation %"
    wind:
      name: "$friendly_name Wind"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "$friendly_name IP Address"
  - platform: version
    name: "$friendly_name ESPHome Version"
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    mode:
      name: "$friendly_name Mode"

# --- Phase 4 command buttons (mesh-broadcast to all trackers) ----------
# P5-12: tracker-2 now has its own STC, so it needs native operator buttons
# (matching tracker-1's set).  The mesh broadcast still applies fleet-wide;
# the buttons just make T2's STC directly addressable from its own HA card.
button:
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    force_park:    { name: "$friendly_name Force Park" }
    force_release: { name: "$friendly_name Force Release" }
    stop:          { name: "$friendly_name Emergency Stop" }

# --- Local STC config sliders (P5-12 -- added with the STC) ----------
# Moving a slider sends !cfg set id=N val=V over the local UART.  The STC's
# reply flows through handle_payload_ and republishes the slider state.
number:
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    wind_storm_mps:
      name: "$friendly_name Wind Storm"
      min_value: 5
      max_value: 30
      step: 1
    wind_release_mps:
      name: "$friendly_name Wind Release"
      min_value: 0
      max_value: 20
      step: 1
    storm_dwell_min:
      name: "$friendly_name Storm Dwell"
      min_value: 1
      max_value: 60
      step: 1
    track_thresh:
      name: "$friendly_name Track Threshold"
      min_value: 1
      max_value: 99
      step: 1
    # --- Night-park config (cfg field IDs 0x05-0x09) ---
    night_park_enable:
      name: "$friendly_name Night Park Enable"
      min_value: 0
      max_value: 1
      step: 1
    night_park_az_pct:
      name: "$friendly_name Night Park East"
      min_value: 0
      max_value: 100
      step: 1
    night_park_el_pct:
      name: "$friendly_name Night Park Tilt"
      min_value: 0
      max_value: 100
      step: 1
    night_park_dark_min:
      name: "$friendly_name Night Park Dark Minutes"
      min_value: 1
      max_value: 120
      step: 1
    night_park_dark_thr:
      name: "$friendly_name Night Park Dark Threshold"
      min_value: 5
      max_value: 200
      step: 1
    # Bench helper kept for harness tests that inject synthetic wind
    # without a real sensor.  Has no effect on a node with a real wind
    # sensor + has_wind_sensor: true (the next status poll overwrites it).
    wind_override:
      name: "$friendly_name Wind override"

# --- Bench-test hook: silence outbound traffic without WiFi disconnect --------
# See solar-tracker-1.yaml for full documentation.  Identical switch on every
# node so bench_test.py can drive failover tests on either node.
switch:
  - platform: template
    name: "$friendly_name Test Offline"
    id: test_offline_switch
    optimistic: true
    entity_category: diagnostic
    icon: mdi:test-tube
    turn_on_action:
      - lambda: id(bridge).set_test_offline(true);
    turn_off_action:
      - lambda: id(bridge).set_test_offline(false);
  - platform: template
    name: "$friendly_name Sim Dark"
    id: sim_dark_switch
    optimistic: true
    entity_category: diagnostic
    icon: mdi:weather-night
    turn_on_action:
      - lambda: id(bridge).night_park_set_sim_dark(true);
    turn_off_action:
      - lambda: id(bridge).night_park_set_sim_dark(false);
  - platform: template
    name: "$friendly_name Resume Tracking"
    id: resume_tracking_switch
    optimistic: true
    entity_category: diagnostic
    icon: mdi:play
    turn_on_action:
      - lambda: id(bridge).enter_track_mode();
      - delay: 500ms
      - switch.turn_off: resume_tracking_switch
    turn_off_action:
      - lambda: ;

# --- Debug: runtime baud-rate select (leave at 9600 unless debugging) --
select:
  - id: change_baud_rate
    name: "Baud rate"
    platform: template
    options:
      - "1200"
      - "2400"
      - "4800"
      - "9600"
      - "38400"
      - "57600"
      - "115200"
      - "256000"
      - "512000"
      - "921600"
    initial_option: "9600"
    optimistic: true
    restore_value: True
    internal: false
    entity_category: config
    icon: mdi:swap-horizontal
    set_action:
      - lambda: |-
          id(uart_bus).flush();
          uint32_t new_baud_rate = stoi(x);
          ESP_LOGD("change_baud_rate", "Baud %u -> %u", id(uart_bus).get_baud_rate(), new_baud_rate);
          if (id(uart_bus).get_baud_rate() != new_baud_rate) {
            id(uart_bus).set_baud_rate(new_baud_rate);
            id(uart_bus).load_settings();
          }

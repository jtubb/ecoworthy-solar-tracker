# Solar tracker 2 -- ESP-01S half-duplex bridge to the STC15 board.
#
# Secondary node in the Phase 4 mesh.  Identical to solar-tracker-1
# except for device name, static IP, and tracker_id.  The mesh channel
# and PSK must match tracker-1's values exactly.
#
# To validate ESP-NOW: flash this to a spare ESP-01S, power both nodes,
# and watch the ESPHome logs.  With MESH_TEST_BROADCAST=1 (set at
# compile time in tracker_bridge.h) you should see:
#   tracker-1 log: "test broadcast sent (MESH_TEST_BROADCAST=1)"
#   tracker-2 log: "mesh rx type=99 from XX:XX:XX:XX:XX:XX plen=2"
# and vice-versa.  If you see "AES auth fail", the PSKs differ.

substitutions:
  device_name: solar-tracker-2
  friendly_name: "Solar Tracker 2"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m

logger:
  # HW UART is dedicated to the STC bridge -- disable serial logging.
  baud_rate: 0

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  manual_ip:
    static_ip: 192.168.1.194
    gateway: 192.168.1.254
    subnet: 255.255.255.0
    dns1: 192.168.50.1
  ap:
    ssid: "${device_name} Fallback"
    password: !secret fallback_password

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

web_server:
  port: 80
  include_internal: true

external_components:
  # Raw TCP<->UART for debugging the wire when needed.
  - source: github://oxan/esphome-stream-server
    refresh: 0s
  # Phase 3/4 bridge component, fetched from the project repo on each
  # build.  Lives at <repo-root>/esphome/components/tracker_bridge/
  - source: github://jtubb/ecoworthy-solar-tracker
    components: [tracker_bridge]
    refresh: 0s

uart:
  id: uart_bus
  rx_buffer_size: 512
  baud_rate: 9600
  tx_pin: GPIO1
  rx_pin: GPIO3
  debug:
    direction: BOTH
    after:
      timeout: 100ms
    sequence:
      - lambda: UARTDebug::log_hex(direction, bytes, ' ');

# --- Phase 3 bridge + Phase 4 mesh ------------------------------------
tracker_bridge:
  id: bridge
  uart_id: uart_bus
  mesh:
    channel: 6        # must match wifi: channel: above
    psk: !secret tracker_mesh_psk
    tracker_id: "T2"
    local_role: secondary  # receives WIND from primary; no local wind sensor

stream_server:
  uart_id: uart_bus
  port: 23

# --- Sensors / status -------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "$friendly_name WiFi Signal"
    update_interval: 60s
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    az:
      name: "$friendly_name Azimuth %"
    el:
      name: "$friendly_name Elevation %"
    wind:
      name: "$friendly_name Wind"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "$friendly_name IP Address"
  - platform: version
    name: "$friendly_name ESPHome Version"
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    mode:
      name: "$friendly_name Mode"

binary_sensor:
  - platform: stream_server
    connected:
      name: "$friendly_name Stream Server Client Connected"

# --- Debug: runtime baud-rate select (leave at 9600 unless debugging) --
select:
  - id: change_baud_rate
    name: "Baud rate"
    platform: template
    options:
      - "1200"
      - "2400"
      - "4800"
      - "9600"
      - "38400"
      - "57600"
      - "115200"
      - "256000"
      - "512000"
      - "921600"
    initial_option: "9600"
    optimistic: true
    restore_value: True
    internal: false
    entity_category: config
    icon: mdi:swap-horizontal
    set_action:
      - lambda: |-
          id(uart_bus).flush();
          uint32_t new_baud_rate = stoi(x);
          ESP_LOGD("change_baud_rate", "Baud %u -> %u", id(uart_bus).get_baud_rate(), new_baud_rate);
          if (id(uart_bus).get_baud_rate() != new_baud_rate) {
            id(uart_bus).set_baud_rate(new_baud_rate);
            id(uart_bus).load_settings();
          }

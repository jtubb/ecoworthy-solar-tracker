# Solar tracker 1 -- ESP-01S half-duplex bridge to the STC15 board.
#
# This is the maintained reference YAML for the bridge.  Sync to the
# ESPHome dashboard (or run `esphome run` directly).  Secrets live
# alongside as usual (wifi_ssid, wifi_password, ha_api_key,
# ota_password, fallback_password).
#
# v1 is read-only: the bridge polls the STC every 2 s and publishes
# az / el / wind / mode to HA.  Phase 4 will add multi-tracker mesh
# (ESP-NOW broadcast) so a primary can drive secondaries into storm.

substitutions:
  device_name: solar-tracker-1
  friendly_name: "Solar Tracker 1"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m

logger:
  # HW UART is dedicated to the STC bridge -- disable serial logging.
  baud_rate: 0

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  manual_ip:
    static_ip: 192.168.1.193
    gateway: 192.168.1.254
    subnet: 255.255.255.0
    dns1: 192.168.50.1
  ap:
    ssid: "${device_name} Fallback"
    password: !secret fallback_password

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

web_server:
  port: 80
  include_internal: true

external_components:
  # Raw TCP<->UART for debugging the wire when needed.
  - source: github://oxan/esphome-stream-server
    refresh: 0s
  # Phase 3 bridge component, fetched from the project repo on each
  # build.  Lives at <repo-root>/esphome/components/tracker_bridge/
  # (ESPHome's canonical lookup path; it doesn't accept a custom path).
  - source: github://jtubb/ecoworthy-solar-tracker
    components: [tracker_bridge]
    refresh: 0s

uart:
  id: uart_bus
  rx_buffer_size: 512
  baud_rate: 9600
  tx_pin: GPIO1
  rx_pin: GPIO3
  debug:
    direction: BOTH
    after:
      timeout: 100ms
    sequence:
      - lambda: UARTDebug::log_hex(direction, bytes, ' ');

# --- Phase 3 bridge + Phase 4 mesh ------------------------------------
tracker_bridge:
  id: bridge
  uart_id: uart_bus
  mesh:
    channel: 6        # must match wifi: channel: above
    psk: !secret tracker_mesh_psk
    tracker_id: "T1"
    local_role: secondary  # bench test: receives WIND from synthetic primary on tracker-2
    peers:
      - mac: "84:F3:EB:03:FB:B2"   # Tracker-2 station MAC (verified from logs)
        id: "T2"

stream_server:
  uart_id: uart_bus
  port: 23

# --- Sensors / status -------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "$friendly_name WiFi Signal"
    update_interval: 60s
  # T1 (local STC) status sensors
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    az:
      name: "$friendly_name Azimuth %"
    el:
      name: "$friendly_name Elevation %"
    wind:
      name: "$friendly_name Wind"
  # T2 peer status sensors (published by gateway when T2 TELEMETRY is received)
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    peer_id: "T2"
    az:
      name: "Solar Tracker 2 Azimuth %"
    el:
      name: "Solar Tracker 2 Elevation %"
    wind:
      name: "Solar Tracker 2 Wind"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "$friendly_name IP Address"
  - platform: version
    name: "$friendly_name ESPHome Version"
  # T1 (local STC) mode
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    mode:
      name: "$friendly_name Mode"
  # T2 peer mode (published by gateway when T2 TELEMETRY is received)
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    peer_id: "T2"
    mode:
      name: "Solar Tracker 2 Mode"

binary_sensor:
  - platform: stream_server
    connected:
      name: "$friendly_name Stream Server Client Connected"

# --- Phase 4 command buttons (mesh-broadcast to all trackers) ----------
button:
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    force_park:    { name: "$friendly_name Force Park" }
    force_release: { name: "$friendly_name Force Release" }
    stop:          { name: "$friendly_name Emergency Stop" }

# --- Phase 4 Task 11: RW config sliders -----------------------------------
# T1 (local STC) config.  Moving a slider sends !cfg set id=N val=V over UART.
number:
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    wind_storm_mps:
      name: "$friendly_name Wind Storm"
      min_value: 5
      max_value: 30
      step: 1
    wind_release_mps:
      name: "$friendly_name Wind Release"
      min_value: 0
      max_value: 20
      step: 1
    storm_dwell_min:
      name: "$friendly_name Storm Dwell"
      min_value: 1
      max_value: 60
      step: 1
    track_thresh:
      name: "$friendly_name Track Threshold"
      min_value: 1
      max_value: 99
      step: 1
  # T2 peer config.  Moving a slider broadcasts CONFIG SET_REQ over mesh.
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    peer_id: "T2"
    wind_storm_mps:
      name: "Solar Tracker 2 Wind Storm"
      min_value: 5
      max_value: 30
      step: 1
    wind_release_mps:
      name: "Solar Tracker 2 Wind Release"
      min_value: 0
      max_value: 20
      step: 1
    storm_dwell_min:
      name: "Solar Tracker 2 Storm Dwell"
      min_value: 1
      max_value: 60
      step: 1
    track_thresh:
      name: "Solar Tracker 2 Track Threshold"
      min_value: 1
      max_value: 99
      step: 1

# --- Debug: runtime baud-rate select (leave at 9600 unless debugging) --
select:
  - id: change_baud_rate
    name: "Baud rate"
    platform: template
    options:
      - "1200"
      - "2400"
      - "4800"
      - "9600"
      - "38400"
      - "57600"
      - "115200"
      - "256000"
      - "512000"
      - "921600"
    initial_option: "9600"
    optimistic: true
    restore_value: True
    internal: false
    entity_category: config
    icon: mdi:swap-horizontal
    set_action:
      - lambda: |-
          id(uart_bus).flush();
          uint32_t new_baud_rate = stoi(x);
          ESP_LOGD("change_baud_rate", "Baud %u -> %u", id(uart_bus).get_baud_rate(), new_baud_rate);
          if (id(uart_bus).get_baud_rate() != new_baud_rate) {
            id(uart_bus).set_baud_rate(new_baud_rate);
            id(uart_bus).load_settings();
          }

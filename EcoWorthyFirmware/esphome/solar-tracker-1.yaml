# Solar tracker 1 -- ESP-01S half-duplex bridge to the STC15 board.
#
# This is the maintained reference YAML for the bridge.  Sync to the
# ESPHome dashboard (or run `esphome run` directly).  Secrets live
# alongside as usual (wifi_ssid, wifi_password, ha_api_key,
# ota_password, fallback_password).
#
# v1 is read-only: the bridge polls the STC every 2 s and publishes
# az / el / wind / mode to HA.  Phase 4 will add multi-tracker mesh
# (ESP-NOW broadcast) so a primary can drive secondaries into storm.

substitutions:
  device_name: solar-tracker-1
  friendly_name: "Solar Tracker 1"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m

logger:
  # HW UART is dedicated to the STC bridge -- disable serial logging.
  baud_rate: 0

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  manual_ip:
    static_ip: 192.168.1.193
    gateway: 192.168.1.254
    subnet: 255.255.255.0
    dns1: 192.168.50.1
  ap:
    ssid: "${device_name} Fallback"
    password: !secret fallback_password

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

web_server:
  port: 80
  include_internal: true

external_components:
  # Phase 3 bridge component, fetched from the project repo on each
  # build.  Lives at <repo-root>/esphome/components/tracker_bridge/
  # (ESPHome's canonical lookup path; it doesn't accept a custom path).
  - source: github://jtubb/ecoworthy-solar-tracker
    components: [tracker_bridge]
    refresh: 0s

uart:
  id: uart_bus
  rx_buffer_size: 512
  baud_rate: 9600
  tx_pin: GPIO1
  rx_pin: GPIO3
  # NOTE: do not add a `uart: debug:` block here.  It registers as a second
  # consumer of the UART RX buffer and steals bytes from tracker_bridge --
  # diagnosed 2026-05-22.  If you need to sniff the wire, use a logic analyser
  # on GPIO1/3 instead.

# --- Phase 3 bridge + Phase 4 mesh ------------------------------------
tracker_bridge:
  id: bridge
  uart_id: uart_bus
  mesh:
    channel: 6        # must match wifi: channel: above
    psk: !secret tracker_mesh_psk
    has_wind_sensor: true   # P6-1: this node has the real wind sensor; auto-elected primary
    # Fleet-wide peer list lives in secrets.yaml.  The codegen auto-filters this
    # node's own esphome.name from the list, so the same secret can be shared
    # across every tracker in the array -- adding a new tracker means editing
    # one place (secrets.yaml) + creating its device YAML.
    peers: !secret tracker_peers

# NOTE: do not add a `stream_server:` block here.  It registers as a second
# consumer of the UART and competes with tracker_bridge for RX bytes
# (diagnosed 2026-05-22).  If you need a raw TCP<->UART debug shell, do it
# on a spare ESP wired to the STC instead of multiplexing on this one.

# --- Sensors / status -------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "$friendly_name WiFi Signal"
    update_interval: 60s
  # Local STC status sensors.  P5-12: dropped the `peer_id: solar-tracker-2`
  # mirror block now that tracker-2 has its own STC and publishes its own
  # native entities on its own ESPHome device.
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    az:
      name: "$friendly_name Azimuth %"
    el:
      name: "$friendly_name Elevation %"
    wind:
      name: "$friendly_name Wind"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "$friendly_name IP Address"
  - platform: version
    name: "$friendly_name ESPHome Version"
  # Local STC mode.  P5-12: peer mirror dropped (see comment in sensor block).
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    mode:
      name: "$friendly_name Mode"

# --- Phase 4 command buttons (mesh-broadcast to all trackers) ----------
button:
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    force_park:    { name: "$friendly_name Force Park" }
    force_release: { name: "$friendly_name Force Release" }
    stop:          { name: "$friendly_name Emergency Stop" }

# --- Phase 4 Task 11: RW config sliders -----------------------------------
# T1 (local STC) config.  Moving a slider sends !cfg set id=N val=V over UART.
number:
  - platform: tracker_bridge
    tracker_bridge_id: bridge
    wind_storm_mps:
      name: "$friendly_name Wind Storm"
      min_value: 5
      max_value: 30
      step: 1
    wind_release_mps:
      name: "$friendly_name Wind Release"
      min_value: 0
      max_value: 20
      step: 1
    storm_dwell_min:
      name: "$friendly_name Storm Dwell"
      min_value: 1
      max_value: 60
      step: 1
    track_thresh:
      name: "$friendly_name Track Threshold"
      min_value: 1
      max_value: 99
      step: 1
    # --- Night-park config (cfg field IDs 0x05-0x09) ---
    # Enable as a number 0/1 to share the same read-back machinery as the
    # other sliders.  HA renders it as a tiny slider; functional even if
    # not as pretty as a toggle.
    night_park_enable:
      name: "$friendly_name Night Park Enable"
      min_value: 0
      max_value: 1
      step: 1
    night_park_az_pct:
      name: "$friendly_name Night Park East"
      min_value: 0
      max_value: 100
      step: 1
    night_park_el_pct:
      name: "$friendly_name Night Park Tilt"
      min_value: 0
      max_value: 100
      step: 1
    night_park_dark_min:
      name: "$friendly_name Night Park Dark Minutes"
      min_value: 1
      max_value: 120
      step: 1
    night_park_dark_thr:
      name: "$friendly_name Night Park Dark Threshold"
      min_value: 5
      max_value: 200
      step: 1
# --- Bench-test hook: silence outbound traffic without WiFi disconnect --------
# Turning this ON stops the STC poll, mesh broadcasts, and cfg_poll.
# The node still receives mesh frames and is reachable via the HA API.
# Useful for simulating a "alive-but-silent" failure mode to test
# gateway and wind-primary failover without physically disconnecting hardware.
# entity_category: diagnostic keeps it out of the default HA dashboard view.
switch:
  - platform: template
    name: "$friendly_name Test Offline"
    id: test_offline_switch
    optimistic: true
    entity_category: diagnostic
    icon: mdi:test-tube
    turn_on_action:
      - lambda: id(bridge).set_test_offline(true);
    turn_off_action:
      - lambda: id(bridge).set_test_offline(false);
  - platform: template
    name: "$friendly_name Sim Dark"
    id: sim_dark_switch
    optimistic: true
    entity_category: diagnostic
    icon: mdi:weather-night
    turn_on_action:
      - lambda: id(bridge).night_park_set_sim_dark(true);
    turn_off_action:
      - lambda: id(bridge).night_park_set_sim_dark(false);

# --- Debug: runtime baud-rate select (leave at 9600 unless debugging) --
select:
  - id: change_baud_rate
    name: "Baud rate"
    platform: template
    options:
      - "1200"
      - "2400"
      - "4800"
      - "9600"
      - "38400"
      - "57600"
      - "115200"
      - "256000"
      - "512000"
      - "921600"
    initial_option: "9600"
    optimistic: true
    restore_value: True
    internal: false
    entity_category: config
    icon: mdi:swap-horizontal
    set_action:
      - lambda: |-
          id(uart_bus).flush();
          uint32_t new_baud_rate = stoi(x);
          ESP_LOGD("change_baud_rate", "Baud %u -> %u", id(uart_bus).get_baud_rate(), new_baud_rate);
          if (id(uart_bus).get_baud_rate() != new_baud_rate) {
            id(uart_bus).set_baud_rate(new_baud_rate);
            id(uart_bus).load_settings();
          }
